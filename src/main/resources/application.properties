spring.application.name=employee-management-api

# ---------- H2 In-Memory Database ----------
spring.datasource.url=jdbc:h2:mem:empdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console -> open http://localhost:8080/h2-console in browser
# JDBC URL field there: jdbc:h2:mem:empdb (username: sa, no password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate ----------
# create-drop = schema is created fresh on startup, dropped on shutdown (good for learning/dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Loads data.sql automatically after Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=8080
